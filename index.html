function isPctStat(k){ return ['hpBoost','crit','hit','antiCrit','defBoost','dot'].indexOf(k)>=0; }
function statsToText(st){ var arr=[]; for(var k in st){ var v=st[k]; arr.push(statLabel(k)+' +'+v+(isPctStat(k)?'%':'')); } return arr.join('、'); }
function equipBonus(){ var b={atk:0,def:0,hp:0,hpBoost:0,crit:0,hit:0,antiCrit:0,defBoost:0,dot:0,gengu:0,tipo:0,wuxing:0,yanli:0,shenxing:0,xinxing:0,fuyuan:0,jiyuan:0}; var eq=state.equip||{}; for(var slot in eq){ var g=gearById(eq[slot]); if(!g) continue; for(var k in g.stats) b[k]=(b[k]||0)+g.stats[k]; } return b; }
var _GEAR_BY_TIER=null;
function _gearsByTier(t){ if(_GEAR_BY_TIER===null){ _GEAR_BY_TIER={}; for(var id in GEAR_DB){ var k=GEAR_DB[id].tierIdx; (_GEAR_BY_TIER[k]||(_GEAR_BY_TIER[k]=[])).push(id); } } return _GEAR_BY_TIER[t]||[]; }
function randomGearForRealm(realm){ var r=Math.random(), tier=realm; if(r<0.20) tier=Math.max(0,realm-1); else if(r>0.90) tier=Math.min(7,realm+1); var pool=_gearsByTier(tier); if(!pool.length) pool=_gearsByTier(Math.max(0,Math.min(7,realm))); if(!pool.length) return null; return pool[Math.floor(Math.random()*pool.length)]; }
function equipItem(id){ var g=gearById(id); if(!g) return; var slot=g.slot; var bag=(state.bag&&state.bag.gear)||[]; var i=bag.indexOf(id); if(i<0) return; bag.splice(i,1); var prev=(state.equip||{})[slot]; if(prev) bag.push(prev); state.equip=state.equip||{}; state.equip[slot]=id; refreshMaxStats(); showToast('已裝備 '+g.name); saveState(); render(); }
function unequipItem(slot){ var id=(state.equip||{})[slot]; if(!id) return; var g=gearById(id); state.bag=state.bag||{gear:[]}; state.bag.gear=state.bag.gear||[]; state.bag.gear.push(id); delete state.equip[slot]; refreshMaxStats(); showToast('已卸下 '+(g?g.name:'裝備')); saveState(); render(); }

// 點一次=1 ；按住 2 秒後開始每 100ms 連發；放開立即停止
window._holdT=null; window._holdI=null; window._suppressClick=false;
function holdFire(btn){ if(btn && btn.onclick){ try{ btn.onclick.call(btn); }catch(e){} } }
function holdStart(btn){
  if(window._holdT){clearTimeout(window._holdT);window._holdT=null;}
  if(window._holdI){clearInterval(window._holdI);window._holdI=null;}
  holdFire(btn);                 // 立即 +1（或 -1）
  window._suppressClick=true;    // 避免 mouseup 後的自然 click 重複觸發
  window._holdT=setTimeout(function(){
    window._holdI=setInterval(function(){ holdFire(btn); }, 100);
  }, 2000);
}
function holdStop(){
  if(window._holdT){clearTimeout(window._holdT);window._holdT=null;}
  if(window._holdI){clearInterval(window._holdI);window._holdI=null;}
}
if(!window._holdInit){
  window._holdInit=true;

    var btn = ev.target && ev.target.closest && ev.target.closest('.qbtn');
    if(!btn) return;
    ev.preventDefault();
    holdStart(btn);
  });
  document.addEventListener('touchstart', function(ev){
    var btn = ev.target && ev.target.closest && ev.target.closest('.qbtn');
    if(!btn) return;
    ev.preventDefault();
    holdStart(btn);
  }, {passive:false});
  document.addEventListener('mouseup', holdStop);
  document.addEventListener('mouseleave', holdStop);
  document.addEventListener('touchend', holdStop);
  document.addEventListener('touchcancel', holdStop);
  // 在 capture phase 攔截 mousedown 之後的 click，避免雙重觸發
  document.addEventListener('click', function(ev){
    var btn = ev.target && ev.target.closest && ev.target.closest('.qbtn');
    if(btn && window._suppressClick){

  if(kind==='spellpick' && opt && opt.skill && (opt.skill.splash||0)>0){ var _sf=opt.skill.splashFactor||0.5; var _spd=Math.max(1,Math.floor(dmg*_sf)); var _oth=[]; for(var _si=0;_si<MB.mons.length;_si++){ if(_si!==ti&&MB.mons[_si].alive) _oth.push(_si); } var _sn=opt.skill.splashN||0; if(_sn>0&&_oth.length>_sn){ for(var _x=_oth.length-1;_x>0;_x--){ var _y=Math.floor(Math.random()*(_x+1)); var _tt=_oth[_x];_oth[_x]=_oth[_y];_oth[_y]=_tt; } _oth=_oth.slice(0,_sn); } _oth.forEach(function(_si){ var _sm=MB.mons[_si]; _sm.hp-=_spd; setBar('bt-emini-'+_si,_sm.hp/_sm.max*100); if(_si===MB.cur) setBar('bt-ehp',_sm.hp/_sm.max*100); bmPush('　濺射波及 '+_sm.name+'，造成 '+fmt(_spd)+' 傷害','good'); if(_sm.hp<=0) _killEnemy(_si); }); }
  var _selem=(opt&&opt.skill&&opt.skill.gf)?opt.skill.elem:(fx==='火'?'huo':fx==='冰'?'bing':fx==='雷'?'lei':null);
  if(tgt.hp<=0){ _killEnemy(ti); }
  else {
    if(_selem==='huo'){ _addStatus(tgt.st,'burn',3,Math.max(1,Math.floor(dmg*0.12))); bmPush('🔥 '+tgt.name+' 陷入灼燒','info'); }
    else if(_selem==='bing'){ if(Math.random()<0.45){ _addStatus(tgt.st,'freeze',1,0); bmPush('❄️ '+tgt.name+' 被凍結！','info'); } }
    else if(_selem==='lei'){ if(Math.random()<0.45){ _addStatus(tgt.st,'paralyze',1,0); bmPush('💫 '+tgt.name+' 被麻痺！','info'); } }
    else if(_selem==='du'){ _addStatus(tgt.st,'poison',3,Math.max(1,Math.floor(dmg*0.1))); bmPush('☠️ '+tgt.name+' 中毒','info'); }
    if(opt&&opt.skill&&opt.skill.gf&&opt.skill.elem==='mu'){ var _hl2=Math.floor(MB.pmax*0.06); MB.php=Math.min(MB.pmax,MB.php+_hl2); state.hp=Math.floor(MB.php); setBar('bt-php',MB.php/MB.pmax*100); bmPush('🌿 木靈回春，道友回復 '+fmt(_hl2)+' 氣血','good'); }
  }
}
function _enemyHit(idx){
  if(!MB||!MB.mons[idx]||!MB.mons[idx].alive) return; _focusE(idx);
  var m=MB.mons[idx], mon=m.tpl, p=MB.p; var rc=gongfaReact();
  if(rc.missChance>0 && Math.random()<rc.missChance){ var oth=[]; for(var oi=0;oi<MB.mons.length;oi++){ if(oi!==idx&&MB.mons[oi].alive) oth.push(oi); } if(oth.length){ var tj=oth[Math.floor(Math.random()*oth.length)]; var om=MB.mons[tj]; var fd=Math.max(1,Math.floor(mon.atk*(0.6+Math.random()*0.4))); om.hp-=fd; setBar('bt-emini-'+tj,om.hp/om.max*100); if(tj===MB.cur) setBar('bt-ehp',om.hp/om.max*100); bmPush('🌑 暗影侵蝕！'+m.name+' 誤傷 '+om.name+'，造成 '+fmt(fd)+' 傷害','good'); if(om.hp<=0) _killEnemy(tj); return; } }
  if(Math.random()<p.dodge){ bmPush('　道友身形一閃，避開 '+m.name+' 的攻擊','info'); return; }
  var red=p.dmgRed+(MB.shield>=2?0.3:0); var mdmg=Math.max(1,Math.floor(mon.atk*(1-Math.min(0.85,red))*(0.8+Math.random()*0.4))); MB.php-=mdmg; state.hp=Math.max(0,Math.floor(MB.php)); setBar('bt-php', MB.php/MB.pmax*100); bmPush('👹 '+m.name+' 攻擊，道友受 '+fmt(mdmg)+' 傷害','bad');
  if(m.alive){
    if(rc.reflectPct>0){ var rf=Math.max(1,Math.floor(mdmg*rc.reflectPct/100)); m.hp-=rf; setBar('bt-emini-'+idx,m.hp/m.max*100); if(idx===MB.cur) setBar('bt-ehp',m.hp/m.max*100); bmPush('🛡️ 厚土反彈，'+m.name+' 受 '+fmt(rf)+' 反傷','good'); if(m.hp<=0){ _killEnemy(idx); return; } }
    if(rc.paralyzeChance>0 && Math.random()<rc.paralyzeChance){ _addStatus(m.st,'paralyze',1,0); bmPush('💫 雷紋反制，'+m.name+' 被麻痺！','good'); }
    if(rc.freezeChance>0 && Math.random()<rc.freezeChance){ _addStatus(m.st,'freeze',1,0); bmPush('❄️ 寒冰反制，'+m.name+' 被冰封！','good'); }
    if(rc.poisonOnHit>0){ _addStatus(m.st,'poison',3,Math.max(1,Math.floor(rc.poisonOnHit*2))); bmPush('☠️ 萬毒附身，'+m.name+' 中毒','good'); }
    if(rc.burnOnHit>0){ _addStatus(m.st,'burn',3,Math.max(1,Math.floor(rc.burnOnHit*2))); bmPush('🔥 反灼，'+m.name+' 灼燒','good'); }
  }
}
var STAT_DEF={ burn:{nm:'灼燒',ic:'🔥',dot:true}, poison:{nm:'中毒',ic:'☠️',dot:true,stack:true}, shock:{nm:'電麻',ic:'⚡',dot:true}, freeze:{nm:'凍結',ic:'❄️',ctrl:true}, paralyze:{nm:'麻痺',ic:'💫',ctrl:true} };
function _addStatus(arr,type,turns,val){ if(!arr) return; var def=STAT_DEF[type]; var ex=null; for(var i=0;i<arr.length;i++){ if(arr[i].type===type){ ex=arr[i]; break; } } if(ex){ if(def&&def.stack) ex.stacks=(ex.stacks||1)+1; ex.turns=Math.max(ex.turns,turns); ex.val=Math.max(ex.val||0,val||0); } else { arr.push({type:type,turns:turns,val:val||0,stacks:1}); } }
function _stBadges(arr){ if(!arr||!arr.length) return ''; var s=''; for(var i=0;i<arr.length;i++){ var d=STAT_DEF[arr[i].type]; if(d) s+=d.ic; } return s?(' <span class="bt-badges">'+s+'</span>'):''; }
function _killEnemy(idx){ var m=MB.mons[idx]; if(!m||!m.alive) return; m.hp=0; m.alive=false; setBar('bt-emini-'+idx,0); var ec=document.getElementById('bt-ecell-'+idx); if(ec){ ec.classList.add('dead'); ec.classList.remove('cur'); } var g=_grantKillReward(m.tpl); bmPush('✅ 擊敗 '+m.name+'！'+g,'good'); addLog('【歷練】擊敗 '+m.name+'：'+g,'great'); }
function _tickPStatus(){ if(!MB.pst||!MB.pst.length) return false; var skip=false,dot=0; MB.pst.forEach(function(st){ var d=STAT_DEF[st.type]; if(!d) return; if(d.dot){ var dd=Math.max(1,Math.floor((st.val||1)*(st.stacks||1))); dot+=dd; bmPush(d.ic+' 道友'+d.nm+'，受 '+fmt(dd)+' 持續傷害'+((st.stacks>1)?'（'+st.stacks+'層）':''),'bad'); } if(d.ctrl) skip=true; }); if(dot>0){ MB.php-=dot; state.hp=Math.max(0,Math.floor(MB.php)); setBar('bt-php',MB.php/MB.pmax*100); } if(skip) bmPush('💫 道友受制，本回合無法行動！','info'); for(var i=MB.pst.length-1;i>=0;i--){ MB.pst[i].turns--; if(MB.pst[i].turns<=0) MB.pst.splice(i,1); } return skip; }
function _tickEStatus(idx){ var m=MB.mons[idx]; if(!m.st||!m.st.length) return false; var skip=false,dot=0; m.st.forEach(function(st){ var d=STAT_DEF[st.type]; if(!d) return; if(d.dot){ var dd=Math.max(1,Math.floor((st.val||1)*(st.stacks||1))); dot+=dd; bmPush(d.ic+' '+m.name+' '+d.nm+'，受 '+fmt(dd)+' 持續傷害'+((st.stacks>1)?'（'+st.stacks+'層）':''),'good'); } if(d.ctrl) skip=true; }); if(dot>0){ m.hp-=dot; setBar('bt-emini-'+idx,m.hp/m.max*100); if(idx===MB.cur) setBar('bt-ehp',m.hp/m.max*100); } if(m.hp<=0){ _killEnemy(idx); for(var k=m.st.length-1;k>=0;k--){ m.st[k].turns--; if(m.st[k].turns<=0) m.st.splice(k,1); } return true; } if(skip) bmPush('🧊 '+m.name+' 受制，無法行動！','info'); for(var j=m.st.length-1;j>=0;j--){ m.st[j].turns--; if(m.st[j].turns<=0) m.st.splice(j,1); } return skip; }
function mbEnsure(){ if(!MB || MB.over) mbStart(); }
// 一回合 = 我方先行 → 各存活敵人依序行動；done 在整回合結束後回呼
function mbExchange(kind, done, opt){
  if(!MB || MB.over || MB.busy){ if(done)done(); return; }
  if(state.currentTab!=='battle'){ if(done)done(); return; }
  MB.busy=true;
  MB.round++; var rn=document.getElementById('bt-rn'); if(rn) rn.textContent=MB.round;
  if(!MB._vinit){ MB._vinit=true; if((state.vaultBattleDmg||0)>0){ MB.dmgBuff=1.3; state.vaultBattleDmg--; bmPush('🩸 凝血丹藥力湧動，本戰傷害提升 30%！','good'); } }
  { var _rp=(vaultBonus().combatRegenPct||0)+((MB.p&&MB.p.regen)||0); if(_rp>0 && MB.php<MB.pmax){ var _hl=Math.floor(MB.pmax*_rp/100); if(_hl>0){ MB.php=Math.min(MB.pmax,MB.php+_hl); state.hp=Math.floor(MB.php); setBar('bt-php', MB.php/MB.pmax*100); } } }
  var queue=[{w:'p'}]; var _eo=[]; for(var i=0;i<MB.mons.length;i++){ if(MB.mons[i].alive) _eo.push({w:'e',i:i}); } for(var _j=_eo.length-1;_j>0;_j--){ var _k=Math.floor(Math.random()*(_j+1)); var _t=_eo[_j]; _eo[_j]=_eo[_k]; _eo[_k]=_t; } queue=queue.concat(_eo);
  var qi=0; var DLY=(window._btRunning?128:320);
  function step(){
    if(!MB || MB.over){ MB.busy=false; if(done)done(); return; }
    if(state.currentTab!=='battle'){ MB.busy=false; if(done)done(); return; }
    if(qi>=queue.length){ if(MB.shield>0) MB.shield--; MB.busy=false; if(!window._btRunning) render(); if(done)done(); return; }
    _syncVals();
    var t=queue[qi++];
    if(t.w==='p'){
      var pskip=_tickPStatus();
      if(MB.php<=0){ mbFinish(false); MB.busy=false; if(done)done(); return; }
      if(!pskip) _playerHit(kind, opt);
      if(!_anyAliveE()){ mbFinish(true); MB.busy=false; if(done)done(); return; }
      setTimeout(step, DLY);
    } else {
      var idx=t.i; if(!MB.mons[idx].alive){ step(); return; }
      var eskip=_tickEStatus(idx);
      if(!MB.mons[idx].alive){ if(!_anyAliveE()){ mbFinish(true); MB.busy=false; if(done)done(); return; } setTimeout(step, DLY); return; }
      if(!eskip) _enemyHit(idx);
      if(MB.php<=0){ mbFinish(false); MB.busy=false; if(done)done(); return; }
      setTimeout(step, DLY);
    }
  }
  step();
}
function _grantKillReward(mon){
  var lootMult=1+Math.min(5,(state.fuyuan||0)/325); var arr=[];
  { var _vk=vaultBonus(); if(_vk.killRegenPct>0){ state.hp=Math.min(state.hpMax,(state.hp||0)+Math.floor(state.hpMax*_vk.killRegenPct/100)); state.mp=Math.min(state.mpMax,(state.mp||0)+Math.floor(state.mpMax*_vk.killRegenPct/100)); } }
  for(var k in mon.reward){ var val=Math.floor(mon.reward[k]*lootMult); if(k==='lingshi'){state.lingshi+=val;arr.push('靈石+'+fmt(val));} if(k==='shengwang'){state.shengwang+=val;arr.push('聲望+'+val);} if(k==='kuangshi'){state.kuangshi+=val;arr.push('礦石+'+val);} }
  var dl=MONSTER_DROPS[mon.realm]||[]; dl.forEach(function(d){ if(Math.random()<d[1]){ var dn=d[2]+Math.floor(Math.random()*(d[3]-d[2]+1)); applyDrop(d[0],dn,mon.realm); arr.push(DROP_INFO[d[0]].name+'×'+dn); } });
  if(mon.xiuwei){ var _xw=Math.floor(mon.xiuwei/(70+Math.random()*30)); state.qi+=_xw; state.totalQi+=_xw; arr.push('修為+'+fmt(_xw)); }
  var _ndR=(0.08+Math.random()*0.02) + Math.min(0.02,(state.fuyuan||0)/2500) + Math.min(0.03,(state.jiyuan||0)/2500);
  if(Math.random()<_ndR){ applyDrop('neidan',1,mon.name); arr.push(mon.name+'內丹×1'); }
  var _eqR=0.08+0.005*mon.realm+(vaultBonus().dropPct||0)/100; if(Math.random()<_eqR){ var _gid=randomGearForRealm(mon.realm); if(_gid){ state.bag.gear=state.bag.gear||[]; state.bag.gear.push(_gid); arr.push('裝備·'+GEAR_DB[_gid].name); } }
  var _wg=WEIWANG_GAIN[mon.realm]||1; var _t0=titleIdx(state.weiwang); state.weiwang=(state.weiwang||0)+_wg; arr.push('威望+'+_wg); if(titleIdx(state.weiwang)>_t0){ arr.push('晉升稱號「'+titleOf(state.weiwang)+'」'); }
  state.killTotal=(state.killTotal||0)+1;
  return arr.join('、');
}
function mbFinish(win){
  if(!MB) return; MB.over=true; state.hp=Math.max(0,Math.floor(MB.php));
  var round=MB.round, php=Math.max(0,Math.floor(MB.php)); var label=(MB.mons?MB.mons.map(function(m){return m.name;}).join('、'):((MB.mon&&MB.mon.name)||'妖獸'));
  if(win){ bmPush('🎉 全數擊敗 '+label+'！','great'); addLog('【歷練】全數擊敗 '+label+'（'+round+'回合）','great'); }
  else { var loss=Math.max(1,Math.floor(state.shouyuan*0.02)); state.shouyuan=Math.max(1,state.shouyuan-loss);
    var _dn=MB.mons?MB.mons[MB.cur].name:(MB.mon&&MB.mon.name); bmPush('❌ 不敵 '+_dn+'，重傷而歸，壽元 -'+loss,'bad'); addLog('【歷練】敗於 '+label+'，壽元-'+loss,'bad'); }
  state.lastBattle={win:win,mon:label,rounds:round,php:php,mhp:0};
  if(state.battleLocationName){ var _np=MONSTERS.filter(function(m){return m.loc===state.battleLocationName;}); state.encounterMon=_np.length?_np[Math.floor(Math.random()*_np.length)]:null; }
  if(!state.battleReports) state.battleReports=[];
  state.battleReports.unshift({win:win,mon:label,rounds:round,php:php,mhp:0,gains:''});
  if(state.battleReports.length>30) state.battleReports.length=30;
  saveState();
}
function _needHp(){ if((state.hp||0)<=0){ showToast('氣血耗盡，請先至修練頁「恢復」'); return true; } return false; }
function actAttack(){ if(window._btRunning||_needHp()) return; mbEnsure(); if(_aliveCount()<=1){ mbExchange('attack', null, {target:_firstAliveE()}); } else { _tgtPick={kind:'attack'}; render(); } }

  var arr=[];
  for(var id in state.gongfa){ var g=state.gongfa[id]; if(!g||g.cat!=='waigong') continue; var d=gfParse(id); if(!d) continue; arr.push({name:g.name, ic:g.ic, desc:d.eff, fx:GF_FX[d.elem]||'劍氣', gf:true, dmg:d.dmg, splash:d.splash, splashN:d.splashN, splashFactor:d.splashFactor, elem:d.elem, aoe:d.aoe}); }

  if(s.kind==='atk'){ var mon=MONSTERS.find(function(m){return m.realm===state.realm;})||MONSTERS[MONSTERS.length-1]; var p=playerCombat(); var dmg=Math.max(1,Math.floor((p.atk-mon.def*0.4)*(0.8+Math.random()*0.5))); setTimeout(function(){ showDamage(dmg); }, 180); } }

function bmPush(txt, cls){
  if(!state.battleLog) state.battleLog=[];
  state.battleLog.unshift({t:txt, c:cls||'info'});
  if(state.battleLog.length>200) state.battleLog.pop();
  var box=document.getElementById('bt-msg');
  if(box){ var d=document.createElement('div'); d.className='bt-line '+(cls||'info'); d.textContent=txt; box.insertBefore(d, box.firstChild); box.scrollTop=0; }

function _syncVals(){ var e=function(id,t){ var el=document.getElementById(id); if(el) el.textContent=t; }; e('bt-phpv',fmt(Math.max(0,Math.floor(state.hp)))); e('bt-pmpv',fmt(Math.max(0,Math.floor(state.mp)))); e('bt-pepv',fmt(Math.max(0,Math.floor(state.ep)))); if(MB&&MB.mons&&MB.mons[MB.cur]) e('bt-ehpv',fmt(Math.max(0,Math.floor(MB.mons[MB.cur].hp)))); }
function toggleAutoBattle(){ if(window._btRunning){ window._btStop=true; } else { startAutoBattle(); } }
function startAutoBattle(){
  if(window._btRunning||_needHp()) return;
  mbEnsure();
  window._btRunning=true; window._btAnim=true; window._btStop=false;
  var _ab=document.querySelector('.bt-auto-btn'); if(_ab){ _ab.textContent='⚔️ 自動攻擊(停)'; _ab.classList.add('running'); }
  (function loop(){
    if(window._btStop || !MB || MB.over || MB.round>=99 || state.currentTab!=='battle'){ if(MB&&!MB.over&&MB.round>=99) bmPush('⌛ 纏鬥不休，雙方暫歇','info'); if(window._btStop) bmPush('⏸️ 自動攻擊已停止','info'); window._btStop=false; window._btRunning=false; window._btAnim=false; render(); return; }
    mbExchange('auto', function(){
      if(!MB || MB.over){ window._btRunning=false; window._btAnim=false; window._btStop=false; render(); return; }
